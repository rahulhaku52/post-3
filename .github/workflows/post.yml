name: Sex Ed Auto Poster

on:
  schedule:
    - cron: '*/30 * * * *'   # প্রতি ৩০ মিনিটে রান
  workflow_dispatch:          # ম্যানুয়ালি রান করার জন্যও

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ক্যাশ থেকে last_index.json রিস্টোর
      - name: Restore index cache
        uses: actions/cache@v4
        with:
          path: last_index.json
          key: last-index-${{ github.run_id }}
          restore-keys: |
            last-index-

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install requests

      - name: Run poster
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python bot.py

      # ক্যাশে last_index.json সংরক্ষণ
      - name: Save index cache
        if: always()
        uses: actions/cache@v4
        with:
          path: last_index.json
          key: last-index-${{ github.run_id }}
